<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Giphy Generator</title>
</head>
<body>

  <form id="form">
    <label for="theme">Enter category:</label>
    <input type="text" id="theme" name="theme" required>
    <button type="submit">Get GIF</button>
  </form>

  <button id="deleteAll">DELETE ALL</button>

  <div id="gifContainer"></div>

  <script>
    const form = document.getElementById("form");
    const gifContainer = document.getElementById("gifContainer");
    const deleteAllBtn = document.getElementById("deleteAll");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const formData = new FormData(form);
      const category = formData.get("theme");

      const url = `https://api.giphy.com/v1/gifs/random?api_key=hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My&tag=${encodeURIComponent(category)}`;

      try {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`Status: ${response.status}`);
        }

        const data = await response.json();

        // URL of the gif
        const gifUrl = data.data.images.original.url;

        // Create wrapper
        const gifDiv = document.createElement("div");

        // Create image
        const img = document.createElement("img");
        img.src = gifUrl;
        img.alt = category;

        // Create delete button
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "DELETE";

        deleteBtn.addEventListener("click", () => {
          gifDiv.remove();
        });

        // Append elements
        gifDiv.appendChild(img);
        gifDiv.appendChild(deleteBtn);

        gifContainer.appendChild(gifDiv);

        form.reset();

      } catch (error) {
        console.error(error);
      }
    });

    // Delete all GIFs
    deleteAllBtn.addEventListener("click", () => {
      gifContainer.innerHTML = "";
    });
  </script>

</body>
</html>
