<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //#1
      async function getGifs() {
        const url = `https://api.giphy.com/v1/gifs/search?q=hilarious&rating=g&api_key=hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My`;

        try {
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`Status: ${response.status}`);
          }

          const data = await response.json();
          console.log(data);
        } catch (error) {
          console.error(error);
        }
      }

      getGifs();

      //#2
      async function getGifs(searchTerm) {
        const url = `https://api.giphy.com/v1/gifs/search?q=${searchTerm}&limit=10&offset=2&rating=g&api_key=hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My`;

        try {
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`Status: ${response.status}`);
          }

          const data = await response.json();

          console.log(data);
        } catch (error) {
          console.error("Error:", error);
        }
      }

      getGifs("sun");

      //#3
      async function getStarship() {
        const url = "https://www.swapi.tech/api/starships/9/";

        try {
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`Status: ${response.status}`);
          }

          const objectStarWars = await response.json();

          console.log(objectStarWars.result);
        } catch (error) {
          console.error("Error:", error);
        }
      }

      getStarship();

      //#4
      function resolveAfter2Seconds() {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve("resolved");
          }, 2000);
        });
      }

      async function asyncCall() {
        console.log("calling");
        let result = await resolveAfter2Seconds();
        console.log(result);
      }

      asyncCall();

      //RESULT:
      // calling
      // (wait 2 seconds)
      // resolved
      //This example demonstrates that await pauses the execution of the current async function, not the entire JavaScript program.
    </script>
  </body>
</html>
