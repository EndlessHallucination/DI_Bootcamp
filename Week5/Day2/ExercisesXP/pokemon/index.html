<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pokemon Fetch</title>
  </head>
  <body>
    <button id="randomBtn">Random Pokemon</button>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>

    <div id="pokemonCard">
      <p id="loading"></p>

      <img id="image" width="200" />

      <h2 id="name"></h2>

      <p>ID: <span id="id"></span></p>
      <p>Height: <span id="height"></span></p>
      <p>Weight: <span id="weight"></span></p>
      <p>Type: <span id="type"></span></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
