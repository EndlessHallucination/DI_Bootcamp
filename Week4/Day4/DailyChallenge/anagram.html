<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function checkAnagram(str1, str2) {
        const a = str1.trim().toLowerCase().split("").sort().join("");
        const b = str2.trim().toLowerCase().split("").sort().join("");

        return a === b;
      }
    </script>
  </body>
