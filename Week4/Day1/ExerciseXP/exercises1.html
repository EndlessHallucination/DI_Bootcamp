<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>

  <body>
    <script>
      const colors = [
        "Blue",
        "Green",
        "Red",
        "Orange",
        "Violet",
        "Indigo",
        "Yellow",
      ];

      const ordinal = ["th", "st", "nd", "rd"];
      //1

      colors.forEach((c, i) => {
        console.log(`${++i}# is ${c}`);
      });

      let check = colors.some((c) => c === "Violet")
        ? console.log("Yeah")
        : console.log("No...");

      //2
      colors.forEach((color, index) => {
        let number = index + 1;

        let suffix =
          number === 1
            ? ordinal[1]
            : number === 2
              ? ordinal[2]
              : number === 3
                ? ordinal[3]
                : ordinal[0];

        console.log(`${number}${suffix} choice is ${color}.`);
      });

      //3

      //ex1
      //["bread", "carrot", "potato", "chicken", "apple", "orange"]
      //ex2
      //["U", "S", "A"]
      //ex3
      //[undefined, undefined]

      //4

      const users = [
        {
          firstName: "Bradley",
          lastName: "Bouley",
          role: "Full Stack Resident",
        },
        { firstName: "Chloe", lastName: "Alnaji", role: "Full Stack Resident" },
        {
          firstName: "Jonathan",
          lastName: "Baughn",
          role: "Enterprise Instructor",
        },
        { firstName: "Michael", lastName: "Herman", role: "Lead Instructor" },
        { firstName: "Robert", lastName: "Hajek", role: "Full Stack Resident" },
        { firstName: "Wes", lastName: "Reid", role: "Instructor" },
        { firstName: "Zach", lastName: "Klabunde", role: "Instructor" },
      ];

      const welcomeStudents = users.map((u) => {
        return `Hello ${u.firstName}`;
      });
      console.log(welcomeStudents);

      const filtered = users.filter((u) => {
        return u.role === "Full Stack Resident";
      });
      console.log(filtered);

      const combined = users
        .filter((u) => {
          return u.role === "Full Stack Resident";
        })
        .map((u) => {
          return `Hello ${u.firstName}`;
        });

      console.log(combined);

      //5
      const epic = [
        "a",
        "long",
        "time",
        "ago",
        "in a",
        "galaxy",
        "far far",
        "away",
      ];

      epicString = epic.reduce(
        (accumulator, currentValue) => accumulator + " " + currentValue,
      );
      console.log(epicString);

      //6
      const students = [
        { name: "Ray", course: "Computer Science", isPassed: true },
        { name: "Liam", course: "Computer Science", isPassed: false },
        { name: "Jenner", course: "Information Technology", isPassed: true },
        { name: "Marco", course: "Robotics", isPassed: true },
        {
          name: "Kimberly",
          course: "Artificial Intelligence",
          isPassed: false,
        },
        { name: "Jamie", course: "Big Data", isPassed: false },
      ];

      students
        .filter((student) => student.isPassed)
        .forEach((student) => {
          console.log(
            `Good job ${student.name}, you passed the course in ${student.course}`,
          );
        });

    
    </script>
