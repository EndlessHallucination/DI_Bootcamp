<!doctype html>
<html>
  <head>
    <style>
      #container {
        width: 400px;
        height: 400px;
        position: relative;
        background: yellow;
      }
      #animate {
        width: 50px;
        height: 50px;
        position: absolute;
        background-color: red;
      }
    </style>
  </head>
  <body>
    <p><button onclick="myMove()">Click Me</button></p>
    <div id="container">
      <div id="animate"></div>
    </div>
    <script>
      function myMove() {
        const box = document.getElementById("animate");

        let position = 0;

        const interval = setInterval(frame, 1);

        function frame() {
          if (position >= 350) {
            clearInterval(interval);
          } else {
            position++;

            box.style.left = position + "px";
          }
        }
      }
    </script>
  </body>
</html>
